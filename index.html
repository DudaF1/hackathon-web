<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RH Cosmetics | Admin Web</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <section class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">RH</div>
        <div>
          <strong>RH Cosmetics</strong>
          <span>Portal administrativo web</span>
        </div>
      </div>

      <div class="login-copy">
        <span class="eyebrow">Acesso administrativo</span>
        <h1>Entrar no painel do RH</h1>
        <p>Use um usuário administrador cadastrado no <strong>database.js</strong>.</p>
      </div>

      <form class="login-form" id="loginForm">
        <label>Usuário</label>
        <input id="loginUser" type="text" placeholder="Ex: 01@adm" autocomplete="username" />

        <label>Senha</label>
        <input id="loginPass" type="password" placeholder="Ex: 1234" autocomplete="current-password" />

        <button class="primary-btn full" type="submit">Entrar</button>
        <p class="login-error hidden" id="loginError">Usuário ou senha inválidos.</p>
      </form>

      <div class="login-hint">
        <strong>Teste rápido:</strong> 01@adm / 1234
      </div>
    </div>
  </section>

  <div class="app-shell hidden" id="adminShell">
    <aside class="sidebar" id="sidebar">
      <div class="brand-block">
        <div class="brand-logo">RH</div>
        <div>
          <strong>RH Cosmetics</strong>
          <span>Área administrativa</span>
        </div>
      </div>

      <nav class="side-nav" aria-label="Navegação administrativa">
        <button class="nav-btn active" data-page="home">Home</button>
        <button class="nav-btn" data-page="beneficios">Benefícios</button>
        <button class="nav-btn" data-page="pessoal">Pessoal</button>
        <button class="nav-btn" data-page="dashboard">Dashboard</button>
        <button class="nav-btn" data-page="analytics">Analytics</button>
      </nav>

      <div class="sidebar-footer">
        <button class="outline-btn full" id="fontMinus">A-</button>
        <button class="outline-btn full" id="fontPlus">A+</button>
      </div>
    </aside>

    <main class="main">
      <div class="top-status-area"></div>

      <header class="topbar">
        <button class="mobile-menu" id="mobileMenu" aria-label="Abrir menu">Menu</button>
        <div>
          <h1 id="pageTitle">Home</h1>
          <p id="pageSubtitle">Gerencie o portal dos funcionários</p>
        </div>
        <div class="profile-area">
          <button class="profile-pill" id="profileBtn">ADM</button>
          <div class="profile-dropdown hidden" id="profileDropdown">
            <button data-page="perfil">Ver meu perfil</button>
            <button class="danger" id="logoutBtn">Sair</button>
          </div>
        </div>
      </header>

      <section class="page-content" id="app"></section>
    </main>
  </div>

  <div class="modal-backdrop hidden" id="modalBackdrop">
    <div class="modal-card" id="modalCard">
      <div class="modal-header">
        <div>
          <h2 id="modalTitle">Título</h2>
          <p id="modalSubtitle">Detalhes</p>
        </div>
        <button class="icon-close" id="modalClose">Fechar</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="database.js"></script>
  <script src="app.js"></script>
</body>
</html>
